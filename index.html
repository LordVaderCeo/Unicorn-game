<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicorn Forest Adventure</title>
    <link rel="stylesheet" href="style.css">
    <!-- Libraries - Using ES Module Shims for broader compatibility -->
    <!-- Load es-module-shims before importmap without async to ensure importmap is applied -->
    <script src="https://unpkg.com/es-module-shims@1.8.3/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.163.0/build/three.module.js",
        "cannon-es": "https://unpkg.com/cannon-es@0.20.0/dist/cannon-es.js",
        "simplex-noise": "https://cdn.skypack.dev/simplex-noise@4.0.1"
      }
    }
    </script>
</head>
<body>
    <div id="ui-container">
        <div id="ammo-count">Ammo: 10</div>
        <div id="message-area">Welcome! Find the Treasure Chest!</div>
    </div>
    <canvas id="game-canvas"></canvas>

    <!-- Main Game Script -->
    <script type="module" src="src/main.js"></script>
</body>
</html>
